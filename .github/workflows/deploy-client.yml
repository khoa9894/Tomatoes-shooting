name: Deploy Game to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the Cocos Creator web build folder
          # After building in Cocos Creator: Project > Build > Platform: Web Desktop
          # The output is at: build/web-desktop/
          path: "build/web-desktop"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
